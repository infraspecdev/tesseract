name: Notify Google Chat on Release
on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post release to Google Chat
        env:
          WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
          NAME: ${{ github.event.release.name }}
          URL: ${{ github.event.release.html_url }}
          BODY: ${{ github.event.release.body }}
          AUTHOR: ${{ github.event.release.author.login }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "GCHAT_WEBHOOK_URL secret is not set" >&2
            exit 1
          fi

          TITLE="${NAME:-$TAG}"
          PAYLOAD=$(jq -n \
            --arg text "🚀 *${REPO}* — *${TITLE}* released by ${AUTHOR}"$'\n\n'"${BODY}"$'\n\n'"${URL}" \
            '{text: $text}')

          curl -sS --fail-with-body -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL"

name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect version changes and create release
        run: |
          CURRENT=$(cat .claude-plugin/marketplace.json)
          PREVIOUS=$(git show HEAD~1:.claude-plugin/marketplace.json 2>/dev/null || echo '{"plugins":[]}')

          echo "$CURRENT" | jq -r '.plugins[] | "\(.name) \(.version)"' | while read -r name version; do
            prev_version=$(echo "$PREVIOUS" | jq -r --arg n "$name" '.plugins[] | select(.name == $n) | .version // "0.0.0"')

            if [ "$version" != "$prev_version" ]; then
              echo "Version changed for $name: $prev_version -> $version"
              TAG="v${version}"

              if git rev-parse "$TAG" >/dev/null 2>&1; then
                echo "Tag $TAG already exists, skipping"
                continue
              fi

              PREV_TAG=$(git tag -l "v*" --sort=-v:refname | head -1)
              if [ -n "$PREV_TAG" ]; then
                NOTES=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
              else
                NOTES="Initial release"
              fi

              git tag "$TAG"
              git push origin "$TAG"

              RELEASE_URL=$(gh release create "$TAG" \
                --title "v${version}" \
                --notes "$NOTES" \
                --target main)

              if [ -z "$GCHAT_WEBHOOK_URL" ]; then
                echo "GCHAT_WEBHOOK_URL secret is not set" >&2
                exit 1
              fi

              PAYLOAD=$(jq -n \
                --arg text "🚀 *${GITHUB_REPOSITORY}* — *v${version}* released by ${GITHUB_ACTOR}"$'\n\n'"${NOTES}"$'\n\n'"${RELEASE_URL}" \
                '{text: $text}')

              curl -sS --fail-with-body -X POST \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD" \
                "$GCHAT_WEBHOOK_URL"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}

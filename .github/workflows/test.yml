name: Test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  shield-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Install deps and run full Shield test suite
        # `make ci` = `make install` + `make test` + `make lint`. The full
        # suite (shield/tests/run-all.sh) covers what the per-step inline
        # checks above used to do: schema validation, config-example
        # validation, plugin/hook structure, executable bits, eval YAML.
        run: make ci

  adapter-contract-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter: [_common, clickup, jira, confluence, notion, sast]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Run contract + idempotency tests
        # No explicit path: each adapter's pyproject `testpaths` governs
        # discovery (sast spreads tests across tests/, semgrep/tests/,
        # sonarqube/tests/; the rest default to tests/).
        run: |
          cd shield/adapters/${{ matrix.adapter }}
          uv run --extra test pytest -v

  mcp-server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Run MCP server tests
        run: |
          if [ -d "shield/adapters/clickup/server" ]; then
            cd shield/adapters/clickup
            uv run --extra test pytest -v
          else
            echo "No MCP server code found, skipping"
          fi

  js-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run shield template JS unit tests
        # Pure-logic tests for shield-nav.js (breadcrumb + Features filter) via
        # Node's built-in runner — zero deps. Mirrors the shield-nav.js pre-commit hook.
        run: node --test "shield/templates/**/*.test.js"

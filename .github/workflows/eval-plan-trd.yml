name: Eval — plan-trd
# Recurring CI gate for the /plan TRD emitter. Runs on every PR or push that
# touches the TRD template, sidecar schema, validators, or eval fixtures.
on:
  push:
    branches: [main]
    paths:
      - 'shield/skills/general/plan-docs/**'
      - 'shield/schema/**'
      - 'shield/scripts/validate_trd.py'
      - 'shield/scripts/validate_plan.py'
      - 'shield/evals/run.py'
      - 'shield/evals/plan-trd.yaml'
      - 'shield/evals/plan-trd/**'
      - '.github/workflows/eval-plan-trd.yml'
  pull_request:
    paths:
      - 'shield/skills/general/plan-docs/**'
      - 'shield/schema/**'
      - 'shield/scripts/validate_trd.py'
      - 'shield/scripts/validate_plan.py'
      - 'shield/evals/run.py'
      - 'shield/evals/plan-trd.yaml'
      - 'shield/evals/plan-trd/**'
      - '.github/workflows/eval-plan-trd.yml'

jobs:
  plan-trd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Run plan-trd eval
        # 3 positive fixtures must PASS; 16 negatives must FAIL with named
        # error codes. Any drift in the slug allow-list or the /plan emitter
        # surfaces here before merge.
        run: uv run --with pyyaml --with jsonschema shield/evals/run.py plan-trd

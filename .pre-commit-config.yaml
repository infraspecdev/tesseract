repos:
  # ── 1. Standard file hygiene ─────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-shebang-scripts-are-executable
      - id: check-merge-conflict

  # ── 2–4. Local hooks ─────────────────────────────────────────────────────
  - repo: local
    hooks:
      # ── 2. Bash syntax ────────────────────────────────────────────────────
      - id: bash-syntax
        name: bash syntax check
        entry: bash -n
        language: system
        files: '\.sh$'

      # ── 3. End-to-end eval format check ──────────────────────────────────
      - id: eval-format
        name: end-to-end eval format check
        entry: python3 shield/evals/_parse_eval.py --check
        language: system
        files: '^shield/evals/.*\.md$'
        # README, inputs/, any per-suite fixtures/ dir (test data, not eval docs),
        # and RED-GREEN.md paper-trail notes that live alongside eval suites.
        exclude: '^shield/evals/(README\.md|inputs/|[^/]+/fixtures/|[^/]+/RED-GREEN\.md$)'

      # ── 4. render-markdown pytest (only when relevant files change) ───────
      - id: render-markdown-tests
        name: render-markdown pytest
        entry: bash -c 'cd shield/scripts && uv run --quiet --with pytest --with "markdown-it-py>=3,<4" --with "mdit-py-plugins>=0.4,<1" pytest test_render_markdown_toc.py test_render_markdown_root.py test_shared_shell_render.py test_write_shield_assets.py test_migrate_outputs_manifest.py'
        language: system
        files: '^shield/(scripts/(render-markdown\.py|write_shield_assets\.py|migrate_outputs\.py|test_.*\.py)|templates/.*)$'
        pass_filenames: false

      # ── 4b. shield-nav.js unit tests (Node's built-in runner, zero deps) ──
      - id: shield-nav-js-tests
        name: shield-nav.js node:test
        entry: bash -c 'node --test shield/templates/shield-nav.test.js'
        language: system
        files: '^shield/templates/shield-nav(\.test)?\.js$'
        pass_filenames: false

      # ── 4c. TRD/plan validators + §10 renderer (HLD authoring gates) ──────
      - id: trd-plan-validator-tests
        name: TRD/plan validators + renderer pytest
        entry: bash -c 'cd shield/scripts && uv run --quiet --with pytest --with pyyaml --with jsonschema pytest test_validate_trd_hld.py test_validate_trd_drift.py test_render_trd_section.py test_validate_plan_milestone_diagram.py -q'
        language: system
        files: '^shield/(scripts/(validate_trd\.py|validate_plan\.py|render_trd_section\.py|test_validate_trd_.*\.py|test_validate_plan_.*\.py|test_render_trd_.*\.py)|schema/plan-sidecar\.schema\.json|schema/trd-sections\.yaml)$'
        pass_filenames: false

      # ── 5. devcontainer Feature ref parse check ──────────────────────────
      # Catches the 'name:tag@sha256:digest' combined form which the Dev
      # Containers CLI rejects (its path regex disallows ':'). Pure Python,
      # no network or Node required — runs in milliseconds.
      - id: devcontainer-refs
        name: devcontainer Feature ref parse check
        entry: python3 shield/scripts/check_devcontainer_refs.py
        language: system
        files: '^(\.devcontainer/devcontainer\.json|shield/scripts/(compose_devcontainer|check_devcontainer_refs)\.py|shield/skills/devcontainer/feature-map\.json)$'
        pass_filenames: false

      # ── 6. shield output-path lint ───────────────────────────────────────
      # Validates the registry + every command/skill/agent's `outputs:` block:
      #   - declared outputs resolve to a real registry entry
      #   - registry placeholders are declared variables or sibling paths
      #   - every registry path is declared by ≥1 asset OR marked `derived:`
      #   - frontmatter is well-formed YAML
      # Whole-repo check (pass_filenames: false) — fast (~1.5s) and catches
      # cross-file drift that a per-file check would miss.
      - id: shield-path-lint
        name: shield output-path lint
        entry: bash -c 'uv run --quiet --with pyyaml shield/scripts/lint_output_paths.py --root .'
        language: system
        files: '^(shield/schema/output-paths\.yaml|shield/commands/.*\.md|shield/skills/.*/SKILL\.md|shield/agents/.*\.md)$'
        pass_filenames: false

      # ── 7. shield path-resolver tests ────────────────────────────────────
      # Resolver behavior is load-bearing for every shield command; fast (<1s).
      - id: shield-resolver-tests
        name: shield path-resolver pytest
        entry: bash -c 'cd shield/scripts && uv run --quiet --with pyyaml --with pytest pytest test_path_resolver.py'
        language: system
        files: '^shield/(scripts/(path_resolver|test_path_resolver)\.py|schema/output-paths\.yaml)$'
        pass_filenames: false

      # ── 8. shield lint-script tests ──────────────────────────────────────
      # Guards against regressions in the lint script itself.
      - id: shield-lint-tests
        name: shield lint-output-paths pytest
        entry: bash -c 'cd shield/scripts && uv run --quiet --with pyyaml --with pytest pytest test_lint_output_paths.py'
        language: system
        files: '^shield/scripts/(lint_output_paths|test_lint_output_paths)\.py$'
        pass_filenames: false

      # ── 9. mermaid validation ────────────────────────────────────────────
      # Mermaid fences ship to the browser un-parsed; this catches the common
      # syntax traps (semicolons, reserved-word actors, block imbalance) in
      # generated docs before they break at view time. Pure-stdlib, offline.
      - id: shield-mermaid-validate
        name: shield mermaid validate
        entry: python3 shield/scripts/validate_mermaid.py
        language: system
        files: '^(docs/.*|shield/(skills|templates|agents)/.*)\.md$'

      # ── 9b. mermaid autofix ──────────────────────────────────────────────
      # Repairs the deterministic trap classes (semicolons, reserved-word
      # actors) and fails if it changed anything, so the dev re-stages — the
      # standard pre-commit fixer pattern.
      - id: shield-mermaid-fix
        name: shield mermaid autofix
        entry: python3 shield/scripts/validate_mermaid.py --fix
        language: system
        files: '^(docs/.*|shield/(skills|templates|agents)/.*)\.md$'

      # ── 10. mermaid validator tests ──────────────────────────────────────
      - id: shield-mermaid-tests
        name: shield validate-mermaid pytest
        entry: bash -c 'cd shield/scripts && uv run --quiet --with pytest pytest test_validate_mermaid.py test_mermaid_authoring_wiring.py'
        language: system
        files: '^(shield/scripts/(validate_mermaid|test_validate_mermaid|test_mermaid_authoring_wiring)\.py|shield/skills/general/(mermaid-authoring\.md|lld-docs/SKILL\.md|prd-docs/SKILL\.md|plan-docs/SKILL\.md)|shield/agents/architect\.md|shield/templates/shell\.html)$'
        pass_filenames: false
